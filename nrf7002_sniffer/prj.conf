# --- Konfiguracja Systemowa ---
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y

# To jest "magiczna" flaga dla nRF5340, która włącza komunikację z rdzeniem sieciowym
# i automatycznie ustawi wszystkie potrzebne parametry (w tym HCI)
CONFIG_BT_HCI_IPC=y

# Opcjonalne, ale pomocne
CONFIG_BT_DEVICE_NAME="nRF7002_Sniffer"

# --- Wi-Fi (nRF7002 + WPA Supplicant) ---
CONFIG_WIFI=y
CONFIG_WIFI_NRF700X=y
CONFIG_WPA_SUPP=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_WIFI_MGMT_RAW_SCAN_RESULTS=y
CONFIG_WIFI_MGMT_RAW_SCAN_RESULT_LENGTH=512

# Włączamy zaawansowane funkcje, które widnieją w Twoim Kconfig
CONFIG_WPA_SUPP_ADVANCED_FEATURES=y
CONFIG_WPA_SUPP_AP=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# Pamięć (zwiększona zgodnie z Twoim Kconfig dla trybu AP/Supplicant)
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=40000
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4200

# --- Komunikacja ---
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_PRINTK=y

CONFIG_WIFI_MGMT_SCAN_SSID_FILT_MAX=1
CONFIG_MAIN_STACK_SIZE=8192