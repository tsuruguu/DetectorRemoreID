# nrf7002_sniffer/prj.conf
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_CODED=y # Bluetooth Long Range (Coded PHY) dla Remote ID 

CONFIG_WIFI=y
CONFIG_WIFI_MGMT_EXT=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_0_NRF_UARTE=y

# Wsparcie dla OpenDroneID [3]
CONFIG_OPENDRONEID_LIB=y