# nrf54_brain/prj.conf
CONFIG_CPLUSPLUS=y
CONFIG_STD_CPP17=y
CONFIG_NEWLIB_LIBC=y

# Komunikacja z nRF7002 przez UART
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_1_NRF_UARTE=y

# Sensory i I2C (BME280)
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_BME280=y

# AI i ML (Edge Impulse / TensorFlow Lite)
CONFIG_EDGE_IMPULSE=y
CONFIG_FPU=y

# Bluetooth 6.0 i Channel Sounding (do precyzyjnej odległości) [1, 2]
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="RemoteID_Brain"
CONFIG_BT_CHANNEL_SOUNDING=y

# UI i ADC (Joystick, TEMT6000)
CONFIG_ADC=y
CONFIG_SPI=y